{% extends "layout.html" %}
{% block container %}

<div class="py-20 w-full max-w-5xl mx-auto px-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-10 text-center">
        Panel de Consultas
    </h1>

    <div class="grid md:grid-cols-2 gap-8">
        <div class="bg-white shadow-md rounded-xl p-8 border border-gray-200 text-center">
            <h2 class="text-2xl font-semibold text-gray-700 mb-4">
                Consultas de Cursos
            </h2>
            <p class="text-gray-600 mb-6">
                Busca cursos y consulta sus alumnos inscritos.
            </p>
            <a href="{{ url_for('cursos.consultas_cursos') }}"
               class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
                Ir a Cursos
            </a>
        </div>

        <div class="bg-white shadow-md rounded-xl p-8 border border-gray-200 text-center">
            <h2 class="text-2xl font-semibold text-gray-700 mb-4">
                Consultas de Alumnos
            </h2>
            <p class="text-gray-600 mb-6">
                Busca alumnos y consulta los cursos a los que están inscritos.
            </p>
            <a href="{{ url_for('cursos.consultas_alumnos') }}"
               class="inline-block bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
                Ir a Alumnos
            </a>
        </div>
    </div>
</div>

{% endblock %}
