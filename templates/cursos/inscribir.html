{% extends "layout.html" %}
{% block container %}

<div class="container mx-auto px-4 mt-24 mb-10">
  <h2 class="max-w-md mx-auto mb-4 text-xl font-bold text-gray-800">Inscribir Alumno a Curso</h2>

  <form class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100"
        action="{{ url_for('cursos.inscribir') }}" method="POST">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-2">Alumno</label>
      <select name="alumno_id" class="w-full border border-gray-300 rounded-lg p-2">
        {% for a in alumnos %}
          <option value="{{ a.id }}">{{ a.nombre }} {{ a.apellidos }} (ID: {{ a.id }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-2">Curso</label>
      <select name="curso_id" class="w-full border border-gray-300 rounded-lg p-2">
        {% for c in cursos %}
          <option value="{{ c.id }}">{{ c.nombre }} (ID: {{ c.id }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="flex flex-col gap-3">
      <button type="submit"
              class="w-full text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-5 py-3">
        Inscribir
      </button>

      <a href="{{ url_for('cursos.listado_cursos') }}"
         class="w-full text-center text-gray-700 bg-gray-100 hover:bg-gray-200 font-medium rounded-lg text-sm px-5 py-3">
        Regresar
      </a>
    </div>
  </form>
</div>

{% endblock %}
